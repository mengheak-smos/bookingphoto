<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Calendar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; }
        
        /* Ensures calendar container fills the viewport minus padding */
        .calendar-wrapper {
            height: 95vh;
            padding: 20px;
        }

        #calendar {
            background: white;
            padding: 20px;
            border-radius: 1rem;
            box-shadow: 0 .5rem 1rem rgba(0,0,0,.15);
        }
    </style>
</head>

<body>

<div class="container-fluid calendar-wrapper">
    <div class="row h-100">
        <div class="col-12 h-100">
            <div id="calendar"></div>
        </div>
    </div>
</div>
<hr>
<div id="details"
     style="white-space: pre-wrap;
            margin-top:20px;
            border:1px solid #ccc;
            padding:15px;">
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', async function() {
    const calendarEl = document.getElementById('calendar');
    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        events: 'https://script.google.com/macros/s/AKfycbzQ_GrjmANTVlCtxqmDAF0IahW1z9AywD7YTHIaFy-2tC9J7fLvf7cwwI8pZhu963Sf/exec', // Use your Apps Script URL
        eventClick: function(details) {

    document.getElementById("details").innerText =
        details.event.extendedProps.description;

}
    });
    calendar.render();
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
